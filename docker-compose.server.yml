networks:
  frontend:
    external: true
  app:
    driver: bridge
    internal: false

services:
  nginx:
    image: nginxinc/nginx-unprivileged:alpine
    depends_on:
      - signing-server
    ports:
      - "8080"
    volumes:
      - ./.docker/templates:/etc/nginx/templates:ro
      - ./.docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - .:/app
    environment:
      NGINX_PORT: 8080
      NGINX_MAX_BODY_SIZE: ${MAX_UPLOAD_SIZE:-56M}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-nginx.rule=Host(`${COMPOSE_SERVER_DOMAIN}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-nginx.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-nginx.tls.certresolver=letsencrypt"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}-nginx.loadbalancer.server.port=8080"
    networks:
      - default
      - frontend

  signing-server:
    build: .
    ports:
      - "8088"
    volumes:
      - ./config/application.yaml:/app/config/application.yaml:ro
      - ./config/certificate.p12:/app/config/certificate.p12:ro
      - ./signed-documents:/app/signed-documents
      - ./signers-documents:/app/signers-documents
      - ./temp-documents:/app/temp-documents

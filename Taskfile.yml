version: '3'

vars:
  SDK_REPO: https://github.com/itk-dev/Signing-Server
  SDK_REPO_BRANCH: feature/sdk-upgrade
  SDK_DIR: Signing-Server
  DOCKER_IMAGE: ghcr.io/itk-dev/signing-server
  MAVEN_IMAGE: maven:3-eclipse-temurin-21
  MAVEN_RUN: >-
    docker run --rm
    -v "{{.ROOT_DIR}}:/build"
    -v "itkdev-signing-m2:/root/.m2"
    -w /build
    {{.MAVEN_IMAGE}}

tasks:
  default:
    desc: List available tasks
    silent: true
    cmds:
      - task --list

  setup:
    desc: Clone SDK, init config, and build everything
    cmds:
      - task: clone
      - task: config:init
      - task: build:all

  clone:
    desc: Clone the Signing-Server SDK repo
    cmds:
      - git clone -b {{.SDK_REPO_BRANCH}} {{.SDK_REPO}} {{.SDK_DIR}}
    status:
      - test -d {{.SDK_DIR}}

  build:sdk:
    desc: Build SDK libraries (install to local Maven repo)
    cmds:
      - >-
        {{.MAVEN_RUN}}
        mvn -f /build/{{.SDK_DIR}}/pom.xml clean install -DskipTests
      - touch .sdk-built
    status:
      - test -f .sdk-built

  build:sdk:force:
    desc: Force rebuild SDK libraries
    cmds:
      - >-
        {{.MAVEN_RUN}}
        mvn -f /build/{{.SDK_DIR}}/pom.xml clean install -DskipTests
      - touch .sdk-built

  build:
    desc: Build the signing webapp
    deps: [build:sdk]
    cmds:
      - >-
        {{.MAVEN_RUN}}
        mvn clean package -DskipTests

  build:all:
    desc: Build SDK and webapp
    cmds:
      - task: build:sdk:force
      - task: build

  dev:
    desc: Run in development mode
    deps: [build:sdk]
    cmds:
      - >-
        docker run --rm
        -v "{{.ROOT_DIR}}:/build"
        -v "itkdev-signing-m2:/root/.m2"
        -w /build
        -p 8088:8088
        {{.MAVEN_IMAGE}}
        mvn spring-boot:run

  run:jar:
    desc: Run the built jar directly
    cmds:
      - >-
        docker run --rm
        -v "{{.ROOT_DIR}}:/app"
        -w /app
        -p 8088:8088
        eclipse-temurin:21-jre-jammy
        java -jar target/itkdev-signing-webapp-*.jar
        --spring.config.location=file:/app/config/application.yaml

  clean:
    desc: Maven clean
    cmds:
      - >-
        {{.MAVEN_RUN}}
        mvn clean

  docker:build:
    desc: Build Docker image
    cmds:
      - docker build -t {{.DOCKER_IMAGE}}:latest .

  docker:push:
    desc: "Build and push Docker image (usage: task docker:push VERSION=1.0.0)"
    requires:
      vars: [VERSION]
    cmds:
      - docker build -t {{.DOCKER_IMAGE}}:{{.VERSION}} -t {{.DOCKER_IMAGE}}:latest .
      - docker push {{.DOCKER_IMAGE}}:{{.VERSION}}
      - docker push {{.DOCKER_IMAGE}}:latest

  config:init:
    desc: Copy example config to application.yaml
    cmds:
      - cp config/application.yaml.example config/application.yaml
    status:
      - test -f config/application.yaml
